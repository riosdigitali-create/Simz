<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#120a1f">
<title>TIENDA SIMZ</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffd23f;--gold2:#ff9f1c;--cyan:#3fd0ff;--pink:#ff3cb0;--red:#ff3b3b;
  --pix:'Press Start 2P','Courier New',monospace;--toon:'Bangers',Impact,sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100%;background:#120a1f;color:#fff;font-family:var(--pix);overflow-x:hidden}
img{image-rendering:pixelated}
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(circle at 50% 0%,rgba(255,60,150,.25),transparent 55%),
             repeating-linear-gradient(90deg,#1b1030 0 40px,#170e2a 40px 80px)}
.bg:after{content:"";position:absolute;inset:0;opacity:.5;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.35) 0 2px,transparent 2px 5px)}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:20px 16px 70px}

.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap}
.pixbtn{font-family:var(--pix);font-size:10px;letter-spacing:1px;color:#2b1600;cursor:pointer;border:0;
  background:linear-gradient(180deg,var(--gold),var(--gold2));padding:12px 16px;
  box-shadow:0 0 0 3px #2b1600,0 5px 0 0 #a35d00,0 5px 0 3px #2b1600;text-decoration:none;display:inline-block}
.pixbtn:active{transform:translateY(3px);box-shadow:0 0 0 3px #2b1600,0 2px 0 0 #a35d00,0 2px 0 3px #2b1600}
.pixbtn.ghost{background:linear-gradient(180deg,#3a4bb5,#222b6e);color:#fff;
  box-shadow:0 0 0 3px #0b0f2a,0 5px 0 0 #131a52,0 5px 0 3px #0b0f2a}

.head{text-align:center;margin-bottom:26px}
.head h1{font-family:var(--toon);font-size:clamp(38px,10vw,84px);letter-spacing:3px;line-height:1;
  text-shadow:0 0 12px var(--pink),0 0 34px var(--pink),0 5px 0 #4a0b33}
.head h1 span{color:var(--cyan);text-shadow:0 0 12px var(--cyan),0 0 34px var(--cyan),0 5px 0 #063648}
.head p{font-size:9px;color:#d5b8ff;margin-top:14px;line-height:2;padding:0 6px}

.shelf{border:4px solid #6b3b1d;border-radius:10px;padding:20px;
  background:linear-gradient(180deg,#3a2414,#241207);box-shadow:inset 0 0 60px rgba(0,0,0,.7)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.card{position:relative;aspect-ratio:3/4;border-radius:6px;overflow:hidden;cursor:pointer;
  background:linear-gradient(180deg,#2b2050,#150e2b);border:3px solid #ffd23f55;
  display:flex;align-items:center;justify-content:center;transition:.2s}
.card:hover{transform:translateY(-6px) rotate(-1deg);border-color:var(--gold);box-shadow:0 14px 30px rgba(0,0,0,.6)}
.card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card.locked img{filter:blur(9px) brightness(.45)}
.card .sil{width:58%;height:58%;background:#000;opacity:.75;filter:blur(1px);
  clip-path:polygon(50% 0%,68% 22%,100% 30%,78% 55%,86% 100%,50% 80%,14% 100%,22% 55%,0% 30%,32% 22%)}
.card .lock{position:absolute;font-size:28px;filter:drop-shadow(0 0 10px #000)}
.card .label{position:absolute;bottom:0;left:0;right:0;padding:10px;text-align:center;font-size:8px;
  letter-spacing:1px;color:var(--gold);background:linear-gradient(180deg,transparent,rgba(0,0,0,.92));line-height:1.8}
.card .price{display:block;color:#fff;margin-top:6px;font-size:9px}
.card .tag{position:absolute;top:8px;left:8px;font-size:7px;padding:5px 7px;border-radius:4px;
  background:#0b0f2acc;border:1px solid var(--gold);color:var(--gold)}
.neon{text-align:center;margin-top:26px;font-size:9px;letter-spacing:3px;color:#ff6ec7;
  text-shadow:0 0 10px var(--pink);animation:neon 2.6s infinite;line-height:2}
@keyframes neon{0%,100%{opacity:1}50%{opacity:.45}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9;
  background:rgba(10,14,42,.95);border:2px solid var(--red);border-radius:6px;padding:12px 16px;font-size:9px}
.hidden{display:none}
@media(max-width:640px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .shelf{padding:12px;border-width:3px}
  .card .label{font-size:7px;padding:8px}
  .head p{font-size:8px}
  .neon{font-size:7px;letter-spacing:2px}
}
@media(max-width:360px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg"></div>

<div class="wrap">
  <div class="topbar">
    <a class="pixbtn ghost" href="index.html">◀ VOLVER AL MAPA</a>
    <a class="pixbtn" href="admin.html">⚙ ADMIN</a>
  </div>

  <div class="head">
    <h1>TIENDA <span>SIMZ</span></h1>
    <p id="intro">Coleccionables oficiales del Mundo Simz. Los artículos exclusivos se desbloquearán con las próximas temporadas.</p>
  </div>

  <div class="shelf"><div class="grid" id="grid"></div></div>

  <div class="neon">COLECCIONABLES · CÓMICS · RAREZAS · PRÓXIMAMENTE</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const DEFAULTS = {
  intro: 'Coleccionables oficiales del Mundo Simz. Los artículos exclusivos se desbloquearán con las próximas temporadas.',
  items: Array.from({ length: 10 }, (_, i) => ({
    id: 'p' + (i + 1), name: 'Próximamente', price: '', image: '', locked: true, tag: ''
  }))
};

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.remove('hidden');
  clearTimeout(t._x); t._x = setTimeout(() => t.classList.add('hidden'), 2000);
}

function render(data) {
  document.getElementById('intro').textContent = data.intro || DEFAULTS.intro;
  const g = document.getElementById('grid'); g.innerHTML = '';
  (data.items || DEFAULTS.items).slice(0, 20).forEach(it => {
    const locked = it.locked !== false;
    const d = document.createElement('div');
    d.className = 'card' + (locked ? ' locked' : '');
    d.innerHTML =
      (it.image ? `<img src="${it.image}" alt="">` : '<div class="sil"></div>') +
      (locked ? '<div class="lock">🔒</div>' : '') +
      (it.tag ? `<div class="tag">${it.tag}</div>` : '') +
      `<div class="label">${locked ? 'Próximamente' : (it.name || 'Artículo')}
         ${!locked && it.price ? `<span class="price">${it.price}</span>` : ''}</div>`;
    d.onclick = () => toast(locked ? 'Próximamente…' : (it.name || 'Artículo') + (it.price ? ' · ' + it.price : ''));
    g.appendChild(d);
  });
}

// productos.json lo genera el panel de administración; si no existe, se usan los 6 por defecto
fetch('productos.json?t=' + Date.now())
  .then(r => r.ok ? r.json() : DEFAULTS)
  .catch(() => DEFAULTS)
  .then(render)
  .catch(() => render(DEFAULTS));
</script>
</body>
</html>
